<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频库测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            color: #303133;
            border-bottom: 2px solid #409eff;
            padding-bottom: 10px;
        }
        h2 {
            color: #606266;
            margin-top: 0;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .status.success {
            background: #f0f9ff;
            color: #67c23a;
            border: 1px solid #67c23a;
        }
        .status.error {
            background: #fef0f0;
            color: #f56c6c;
            border: 1px solid #f56c6c;
        }
        .status.info {
            background: #ecf5ff;
            color: #409eff;
            border: 1px solid #409eff;
        }
        button {
            background: #409eff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background: #66b1ff;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 15px;
            background: white;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        .card p {
            margin: 5px 0;
            color: #606266;
        }
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        select, input {
            padding: 8px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .test-link {
            display: inline-block;
            padding: 10px 20px;
            background: #67c23a;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin: 10px 10px 10px 0;
        }
        .test-link:hover {
            background: #85ce61;
        }
    </style>
</head>
<body>
    <h1>🎬 视频库功能测试</h1>

    <div class="container">
        <h2>1. 访问前端页面</h2>
        <div class="status info">
            <strong>提示：</strong>点击以下链接访问前端页面进行测试
        </div>
        <a href="http://localhost:37073/" class="test-link" target="_blank">📱 打开前端管理后台</a>
        <a href="http://localhost:37073/login" class="test-link" target="_blank">🔑 登录页面</a>
        <a href="http://localhost:37073/video-library" class="test-link" target="_blank">🎥 视频库页面</a>
    </div>

    <div class="container">
        <h2>2. API测试</h2>
        <div id="login-status"></div>

        <h3>步骤1: 登录获取Token</h3>
        <button onclick="login()">🔐 登录 (admin/admin123)</button>
        <div id="login-result"></div>

        <h3>步骤2: 测试API</h3>
        <div class="filters">
            <button onclick="testHotTemplates()">🔥 获取热门模板</button>
            <button onclick="testFilterOptions()">🔧 获取筛选选项</button>
            <button onclick="testCategories()">📁 获取分类列表</button>
            <button onclick="testTemplateList()">📋 获取模板列表</button>
            <button onclick="testStatistics()">📊 获取统计数据</button>
        </div>
        <div id="api-result"></div>
    </div>

    <div class="container">
        <h2>3. 模板列表展示</h2>
        <div class="filters">
            <select id="industry-filter" onchange="filterTemplates()">
                <option value="">所有行业</option>
                <option value="餐饮">餐饮</option>
                <option value="零售">零售</option>
                <option value="教育">教育</option>
                <option value="医疗">医疗</option>
            </select>
            <select id="difficulty-filter" onchange="filterTemplates()">
                <option value="">所有难度</option>
                <option value="easy">简单</option>
                <option value="medium">中等</option>
                <option value="hard">困难</option>
            </select>
            <input type="text" id="keyword-filter" placeholder="关键词搜索" onkeyup="if(event.key==='Enter')filterTemplates()">
            <button onclick="filterTemplates()">🔍 搜索</button>
        </div>
        <div id="templates-grid" class="grid"></div>
    </div>

    <div class="container">
        <h2>4. 测试结果</h2>
        <div id="test-summary"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001/api';
        let token = null;
        let testResults = {
            passed: 0,
            failed: 0,
            tests: []
        };

        // 登录
        async function login() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = '<div class="status info">正在登录...</div>';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });

                const data = await response.json();

                if (data.code === 200) {
                    token = data.data.token;
                    resultDiv.innerHTML = `<div class="status success">✅ 登录成功！Token: ${token.substring(0, 50)}...</div>`;
                    updateLoginStatus(true);
                    addTestResult('登录', true, '成功获取Token');
                } else {
                    resultDiv.innerHTML = `<div class="status error">❌ 登录失败: ${data.message}</div>`;
                    addTestResult('登录', false, data.message);
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="status error">❌ 登录错误: ${error.message}</div>`;
                addTestResult('登录', false, error.message);
            }
        }

        // 测试热门模板
        async function testHotTemplates() {
            if (!token) { alert('请先登录！'); return; }
            await testAPI('获取热门模板', `${API_BASE}/video-library/hot?limit=6`);
        }

        // 测试筛选选项
        async function testFilterOptions() {
            if (!token) { alert('请先登录！'); return; }
            await testAPI('获取筛选选项', `${API_BASE}/video-library/filters`);
        }

        // 测试分类列表
        async function testCategories() {
            if (!token) { alert('请先登录！'); return; }
            await testAPI('获取分类列表', `${API_BASE}/video-library/categories`);
        }

        // 测试模板列表
        async function testTemplateList() {
            if (!token) { alert('请先登录！'); return; }
            await testAPI('获取模板列表', `${API_BASE}/video-library/list?page=1&limit=12`);
        }

        // 测试统计数据
        async function testStatistics() {
            if (!token) { alert('请先登录！'); return; }
            await testAPI('获取统计数据', `${API_BASE}/video-library/statistics`);
        }

        // 通用API测试
        async function testAPI(name, url) {
            const resultDiv = document.getElementById('api-result');
            resultDiv.innerHTML = '<div class="status info">正在测试...</div>';

            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.code === 200) {
                    resultDiv.innerHTML = `<div class="status success">✅ ${name}成功！</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    addTestResult(name, true, '返回数据正常');

                    // 如果是模板列表，显示卡片
                    if (data.data && (data.data.list || Array.isArray(data.data))) {
                        displayTemplates(data.data.list || data.data);
                    }
                } else {
                    resultDiv.innerHTML = `<div class="status error">❌ ${name}失败: ${data.message}</div>`;
                    addTestResult(name, false, data.message);
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="status error">❌ ${name}错误: ${error.message}</div>`;
                addTestResult(name, false, error.message);
            }
        }

        // 显示模板卡片
        function displayTemplates(templates) {
            const grid = document.getElementById('templates-grid');
            grid.innerHTML = templates.map(t => `
                <div class="card">
                    <h3>${t.name || '未命名'}</h3>
                    <p><strong>分类:</strong> ${t.category || '-'}</p>
                    <p><strong>行业:</strong> ${t.industry || '-'}</p>
                    <p><strong>难度:</strong> ${getDifficultyLabel(t.difficulty)}</p>
                    <p><strong>时长:</strong> ${formatDuration(t.video_duration)}</p>
                    <p><strong>宽高比:</strong> ${t.aspect_ratio || '-'}</p>
                    <p><strong>使用次数:</strong> ${t.usage_count || 0}</p>
                </div>
            `).join('');
        }

        // 筛选模板
        async function filterTemplates() {
            if (!token) { alert('请先登录！'); return; }

            const industry = document.getElementById('industry-filter').value;
            const difficulty = document.getElementById('difficulty-filter').value;
            const keyword = document.getElementById('keyword-filter').value;

            let url = `${API_BASE}/video-library/list?page=1&limit=12`;
            if (industry) url += `&industry=${encodeURIComponent(industry)}`;
            if (difficulty) url += `&difficulty=${difficulty}`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

            await testAPI('筛选模板', url);
        }

        // 格式化时长
        function formatDuration(seconds) {
            if (!seconds) return '-';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;
        }

        // 获取难度标签
        function getDifficultyLabel(difficulty) {
            const labels = { easy: '简单', medium: '中等', hard: '困难' };
            return labels[difficulty] || '-';
        }

        // 更新登录状态
        function updateLoginStatus(loggedIn) {
            const statusDiv = document.getElementById('login-status');
            if (loggedIn) {
                statusDiv.innerHTML = '<div class="status success">✅ 已登录，可以开始测试</div>';
            } else {
                statusDiv.innerHTML = '<div class="status error">❌ 未登录，请先登录</div>';
            }
        }

        // 添加测试结果
        function addTestResult(name, passed, message) {
            testResults.tests.push({ name, passed, message });
            if (passed) {
                testResults.passed++;
            } else {
                testResults.failed++;
            }
            updateTestSummary();
        }

        // 更新测试摘要
        function updateTestSummary() {
            const summaryDiv = document.getElementById('test-summary');
            const total = testResults.passed + testResults.failed;
            const passRate = total > 0 ? ((testResults.passed / total) * 100).toFixed(1) : 0;

            summaryDiv.innerHTML = `
                <div class="status ${testResults.failed > 0 ? 'error' : 'success'}">
                    <strong>测试统计：</strong>总计 ${total} 项，
                    通过 ${testResults.passed} 项，
                    失败 ${testResults.failed} 项，
                    通过率 ${passRate}%
                </div>
                <h3>详细结果：</h3>
                ${testResults.tests.map(t => `
                    <div class="status ${t.passed ? 'success' : 'error'}">
                        ${t.passed ? '✅' : '❌'} ${t.name}: ${t.message}
                    </div>
                `).join('')}
            `;
        }

        // 初始化
        window.onload = function() {
            updateLoginStatus(false);
        };
    </script>
</body>
</html>
