version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: xiaomotui-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-xiaomotui2024}
      MYSQL_DATABASE: xiaomotui_prod
      MYSQL_USER: xiaomotui
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xiaomotui2024}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - xiaomotui-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: xiaomotui-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-xiaomotui2024}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - xiaomotui-network

  # PHP-FPM 后端 API
  api:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile
    container_name: xiaomotui-api
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - ./docker/api/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - api_storage:/var/www/html/runtime
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=xiaomotui_prod
      - DB_USERNAME=xiaomotui
      - DB_PASSWORD=${MYSQL_PASSWORD:-xiaomotui2024}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-xiaomotui2024}
    depends_on:
      - mysql
      - redis
    networks:
      - xiaomotui-network

  # Nginx Web 服务器
  nginx:
    image: nginx:alpine
    container_name: xiaomotui-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./api:/var/www/html/api:ro
      - ./admin/dist:/var/www/html/admin:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - xiaomotui-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  api_storage:
    driver: local
  nginx_logs:
    driver: local

networks:
  xiaomotui-network:
    driver: bridge
