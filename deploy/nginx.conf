# Nginx配置文件 - 小魔推项目
# 配置时间：2025-10-01
# 说明：支持API反向代理、静态文件服务、SSL证书、安全策略等

# ============================================
# 全局配置
# ============================================
user nginx;
worker_processes auto;  # 自动检测CPU核心数
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    use epoll;  # Linux高性能事件模型
    worker_connections 10240;  # 每个worker进程最大连接数
    multi_accept on;  # 一次接受所有新连接
}

http {
    # ============================================
    # 基础配置
    # ============================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 字符集
    charset utf-8;

    # ============================================
    # 日志格式配置
    # ============================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time';

    log_format json escape=json '{'
                    '"time":"$time_iso8601",'
                    '"remote_addr":"$remote_addr",'
                    '"request_method":"$request_method",'
                    '"request_uri":"$request_uri",'
                    '"status":$status,'
                    '"body_bytes_sent":$body_bytes_sent,'
                    '"request_time":$request_time,'
                    '"upstream_response_time":"$upstream_response_time",'
                    '"http_referer":"$http_referer",'
                    '"http_user_agent":"$http_user_agent",'
                    '"http_x_forwarded_for":"$http_x_forwarded_for"'
                    '}';

    access_log /var/log/nginx/access.log main;

    # ============================================
    # 性能优化配置
    # ============================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;

    # 隐藏Nginx版本号
    server_tokens off;

    # 客户端上传文件大小限制
    client_max_body_size 100m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # 超时设置
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;

    # ============================================
    # Gzip压缩配置
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/woff
        font/woff2;

    # ============================================
    # 安全策略配置
    # ============================================
    # 限制请求方法
    map $request_method $not_allowed_method {
        default 1;
        GET 0;
        POST 0;
        PUT 0;
        DELETE 0;
        OPTIONS 0;
        HEAD 0;
    }

    # 防止SQL注入
    map $query_string $bad_querystring {
        default 0;
        "~*(union|select|insert|update|delete|drop|create|alter|exec|script|iframe)" 1;
    }

    # 防止XSS攻击
    map $request_uri $bad_uri {
        default 0;
        "~*(<script|<iframe|javascript:|onerror=|onload=)" 1;
    }

    # 限制请求速率（IP限流）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================
    # Upstream后端服务配置
    # ============================================
    upstream thinkphp_backend {
        server 127.0.0.1:8000 weight=1 max_fails=3 fail_timeout=30s;
        # 如果有多个后端服务器，可以添加更多：
        # server 127.0.0.1:8001 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ============================================
    # HTTP自动跳转HTTPS
    # ============================================
    server {
        listen 80;
        server_name api.xiaomotui.com admin.xiaomotui.com h5.xiaomotui.com;

        # ACME验证路径（Let's Encrypt证书申请）
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
            default_type "text/plain";
            allow all;
        }

        # 其他请求跳转到HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ============================================
    # API服务器配置 - api.xiaomotui.com
    # ============================================
    server {
        listen 443 ssl http2;
        server_name api.xiaomotui.com;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/api.xiaomotui.com.crt;
        ssl_certificate_key /etc/nginx/ssl/api.xiaomotui.com.key;

        # SSL优化配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # 安全头部
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # 日志配置
        access_log /var/log/nginx/api.xiaomotui.com.access.log json;
        error_log /var/log/nginx/api.xiaomotui.com.error.log warn;

        # 根目录
        root /var/www/xiaomotui/api/public;
        index index.php;

        # 安全检查
        if ($not_allowed_method) {
            return 405;
        }

        if ($bad_querystring) {
            return 403;
        }

        if ($bad_uri) {
            return 403;
        }

        # 防止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 防止访问敏感文件
        location ~* \.(env|git|svn|htaccess|htpasswd)$ {
            deny all;
        }

        # 登录接口限流
        location ~ ^/(login|register|auth) {
            limit_req zone=login_limit burst=3 nodelay;
            limit_conn conn_limit 5;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # API接口限流
        location /api {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # 静态资源缓存
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # PHP请求代理到ThinkPHP后端
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            # 反向代理到ThinkPHP后端
            proxy_pass http://thinkphp_backend;
            proxy_http_version 1.1;

            # 请求头转发
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲区配置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # 禁用缓存（动态内容）
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # 健康检查接口
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ============================================
    # 管理后台配置 - admin.xiaomotui.com
    # ============================================
    server {
        listen 443 ssl http2;
        server_name admin.xiaomotui.com;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/admin.xiaomotui.com.crt;
        ssl_certificate_key /etc/nginx/ssl/admin.xiaomotui.com.key;

        # SSL优化配置（同上）
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头部
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 日志配置
        access_log /var/log/nginx/admin.xiaomotui.com.access.log main;
        error_log /var/log/nginx/admin.xiaomotui.com.error.log warn;

        # 静态文件目录
        root /var/www/xiaomotui/admin/dist;
        index index.html;

        # Vue Router history模式支持
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|map)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML文件不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # 防止访问隐藏文件
        location ~ /\. {
            deny all;
        }

        # API请求代理到后端
        location /api {
            proxy_pass https://api.xiaomotui.com;
            proxy_http_version 1.1;
            proxy_set_header Host api.xiaomotui.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================
    # H5页面配置 - h5.xiaomotui.com
    # ============================================
    server {
        listen 443 ssl http2;
        server_name h5.xiaomotui.com;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/h5.xiaomotui.com.crt;
        ssl_certificate_key /etc/nginx/ssl/h5.xiaomotui.com.key;

        # SSL优化配置（同上）
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头部
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 日志配置
        access_log /var/log/nginx/h5.xiaomotui.com.access.log main;
        error_log /var/log/nginx/h5.xiaomotui.com.error.log warn;

        # 静态文件目录
        root /var/www/xiaomotui/h5/dist;
        index index.html;

        # uni-app H5页面支持
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|map)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML文件不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # 防止访问隐藏文件
        location ~ /\. {
            deny all;
        }

        # API请求代理到后端
        location /api {
            proxy_pass https://api.xiaomotui.com;
            proxy_http_version 1.1;
            proxy_set_header Host api.xiaomotui.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 微信验证文件
        location ~* ^/MP_verify_.*\.txt$ {
            root /var/www/xiaomotui/h5/dist;
            default_type text/plain;
        }
    }

    # ============================================
    # 默认服务器（拒绝未配置的域名访问）
    # ============================================
    server {
        listen 80 default_server;
        listen 443 ssl http2 default_server;
        server_name _;

        # 自签名证书（仅用于默认服务器）
        ssl_certificate /etc/nginx/ssl/default.crt;
        ssl_certificate_key /etc/nginx/ssl/default.key;

        return 444;  # 直接关闭连接
    }
}
